<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Safe Space — Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,400;1,9..144,200;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F5F0E8;--warm:#FAF7F2;--sage:#7D9B76;--sage-light:#A8C4A2;
  --sage-dark:#4A6B44;--terra:#C47B5A;--terra-light:#E8A98A;
  --charcoal:#2C2825;--stone:#6B6560;--mist:#D4CFC8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;color:var(--charcoal);min-height:100vh;overflow:hidden;}

.progress-bar{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(212,207,200,0.4);z-index:200;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--sage-light),var(--sage));border-radius:100px;transition:width 0.4s ease;width:0%;}
.phase-label{position:fixed;top:12px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--stone);font-weight:500;z-index:199;}

.screen{display:none;position:fixed;inset:0;}
.screen.active{display:flex;flex-direction:column;}

/* ── SCOTTY WELCOME CHAT ── */
#screen-welcome-chat{background:var(--charcoal);}

.welcome-chat-top{
  flex-shrink:0;padding:52px 20px 16px;
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.scotty-av-dark{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage),var(--sage-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.welcome-chat-top h2{font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:white;}
.online-dark{font-size:12px;color:var(--sage-light);display:flex;align-items:center;gap:4px;}
.online-dot-dark{width:7px;height:7px;border-radius:50%;background:var(--sage-light);}

.welcome-msgs{
  flex:1;overflow-y:auto;
  padding:24px 16px 120px;
  display:flex;flex-direction:column;gap:14px;
}

.wmsg{display:flex;gap:10px;animation:fadeUp 0.35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.wmsg-av{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage),var(--sage-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;align-self:flex-end;
}

.wmsg-bubble{
  max-width:84%;padding:12px 16px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;border-bottom-left-radius:5px;
  font-size:14px;line-height:1.7;color:rgba(245,240,232,0.9);
  font-weight:300;
}
.wmsg-bubble strong{color:white;font-weight:500;}
.wmsg-bubble em{font-style:italic;color:var(--sage-light);}

.typing-dark{
  display:flex;gap:4px;padding:13px 15px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;border-bottom-left-radius:5px;
  width:58px;
}
.t-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);animation:tdot 1.2s ease infinite;}
.t-dot:nth-child(2){animation-delay:0.15s;}
.t-dot:nth-child(3){animation-delay:0.3s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

.welcome-cta-wrap{
  position:fixed;bottom:0;left:0;right:0;
  padding:16px 20px 36px;
  background:linear-gradient(to top,var(--charcoal) 60%,transparent);
  display:none;
}
.welcome-cta-wrap.show{display:block;}

.welcome-cta{
  width:100%;background:var(--sage);color:white;
  border:none;border-radius:16px;padding:16px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.welcome-cta:hover{background:var(--sage-dark);}

/* ── SWIPE CARDS SCREEN ── */
#screen-cards{
  background:var(--charcoal);
  align-items:center;justify-content:center;
  padding:60px 24px 110px;
  overflow:hidden;
}

#screen-cards::before{
  content:'';position:absolute;top:-80px;right:-80px;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(125,155,118,0.12),transparent 70%);
  pointer-events:none;
}

.card-stage{
  width:100%;max-width:420px;
  position:relative;
  height:100%;
  display:flex;align-items:center;justify-content:center;
}

.q-card{
  position:absolute;width:100%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;padding:32px 26px 28px;
  backdrop-filter:blur(10px);
  transition:transform 0.42s cubic-bezier(0.34,1.1,0.64,1),opacity 0.32s ease;
  will-change:transform,opacity;
  max-height:calc(100vh - 180px);
  overflow-y:auto;
}
.q-card.center{transform:translateX(0) rotate(0deg);opacity:1;}
.q-card.exit-left{transform:translateX(-115%) rotate(-6deg);opacity:0;pointer-events:none;}
.q-card.enter-right{transform:translateX(115%) rotate(4deg);opacity:0;}

.card-stack-2{
  position:absolute;width:96%;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:28px;height:60px;
  transform:translateY(12px);z-index:-1;
}
.card-stack-3{
  position:absolute;width:92%;
  background:rgba(255,255,255,0.015);
  border-radius:28px;height:60px;
  transform:translateY(22px);z-index:-2;
}

.card-eyebrow{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--sage-light);font-weight:500;margin-bottom:12px;}
.card-icon{font-size:36px;margin-bottom:14px;display:block;}
.card-headline{font-family:'Fraunces',serif;font-size:26px;font-weight:200;line-height:1.25;color:white;margin-bottom:12px;}
.card-headline em{font-style:italic;color:var(--sage-light);}
.card-body{font-size:14px;color:rgba(245,240,232,0.7);line-height:1.8;margin-bottom:20px;}
.card-body strong{color:rgba(245,240,232,0.95);font-weight:500;}

.card-list{display:flex;flex-direction:column;gap:10px;margin:10px 0 20px;}
.card-list-item{display:flex;gap:10px;align-items:flex-start;}
.cli-icon{font-size:16px;flex-shrink:0;margin-top:2px;}
.cli-text{font-size:13px;color:rgba(245,240,232,0.75);line-height:1.55;}
.cli-text strong{color:rgba(245,240,232,0.95);font-weight:500;}

.card-footer{font-size:12px;color:rgba(245,240,232,0.4);margin-bottom:20px;line-height:1.6;}

.card-btn{
  width:100%;background:var(--sage);color:white;
  border:none;border-radius:14px;padding:15px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.card-btn:hover{background:var(--sage-dark);}

.card-btn-ghost{
  width:100%;background:transparent;color:rgba(245,240,232,0.35);
  border:none;padding:10px;
  font-family:'DM Sans',sans-serif;font-size:13px;
  cursor:pointer;transition:color 0.2s;margin-top:4px;
}
.card-btn-ghost:hover{color:rgba(245,240,232,0.6);}

.w-dots{
  position:fixed;bottom:76px;left:0;right:0;
  display:flex;gap:6px;justify-content:center;
}
.w-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.3s ease;}
.w-dot.active{background:var(--sage-light);width:20px;border-radius:100px;}

/* ── INTRO CHAT SCREEN ── */
#screen-intro{background:var(--cream);flex-direction:column;}

.chat-top{
  flex-shrink:0;padding:52px 20px 16px;
  display:flex;align-items:center;gap:12px;
  background:var(--warm);border-bottom:1px solid var(--mist);
}
.scotty-av{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage),var(--sage-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.chat-top h2{font-family:'Fraunces',serif;font-size:20px;font-weight:300;}
.online{font-size:12px;color:var(--sage);display:flex;align-items:center;gap:4px;}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);}

.chat-msgs{flex:1;overflow-y:auto;padding:20px 16px 120px;display:flex;flex-direction:column;gap:14px;}

.msg{display:flex;gap:10px;animation:fadeUp 0.35s ease;}
.msg.user{flex-direction:row-reverse;}
.msg-av{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage),var(--sage-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;align-self:flex-end;
}
.msg.user .msg-av{background:linear-gradient(135deg,var(--terra-light),var(--terra));}
.msg-bubble{max-width:78%;padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.65;font-weight:300;}
.msg.scotty .msg-bubble{background:var(--warm);border:1px solid var(--mist);border-bottom-left-radius:5px;color:var(--charcoal);}
.msg.user .msg-bubble{background:var(--sage-dark);color:white;border-bottom-right-radius:5px;}

.typing-ind{display:flex;gap:4px;padding:13px 15px;background:var(--warm);border:1px solid var(--mist);border-radius:18px;border-bottom-left-radius:5px;width:58px;}

.chat-input-wrap{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 14px 28px;
  background:var(--warm);border-top:1px solid var(--mist);
  display:flex;gap:8px;align-items:flex-end;z-index:50;
}
.chat-input{
  flex:1;background:var(--cream);border:1.5px solid var(--mist);
  border-radius:18px;padding:11px 15px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--charcoal);
  resize:none;outline:none;transition:border-color 0.2s;
  max-height:100px;min-height:44px;
}
.chat-input:focus{border-color:var(--sage);}
.chat-input::placeholder{color:var(--mist);}
.chat-input:disabled{opacity:0.5;}
.send-btn{
  width:44px;height:44px;border-radius:50%;
  background:var(--sage-dark);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:white;transition:all 0.2s;flex-shrink:0;
}
.send-btn:hover{background:var(--sage);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── VARK/GAD CARD SCREEN ── */
#screen-quiz{
  background:var(--cream);
  align-items:center;justify-content:center;
  padding:60px 20px 100px;
}

.quiz-stage{
  width:100%;max-width:420px;position:relative;
  height:100%;display:flex;align-items:center;justify-content:center;
}

.qz-card{
  position:absolute;width:100%;
  background:var(--warm);border-radius:28px;
  padding:28px 22px 24px;
  border:1px solid rgba(212,207,200,0.6);
  box-shadow:0 12px 40px rgba(28,25,23,0.08);
  transition:transform 0.42s cubic-bezier(0.34,1.2,0.64,1),opacity 0.32s ease;
  will-change:transform,opacity;
  max-height:calc(100vh - 160px);
  overflow-y:auto;
}
.qz-card.center{transform:translateX(0) rotate(0deg);opacity:1;}
.qz-card.exit-left{transform:translateX(-110%) rotate(-8deg);opacity:0;pointer-events:none;}
.qz-card.enter-right{transform:translateX(110%) rotate(4deg);opacity:0;}

.qz-stack-2{position:absolute;width:96%;background:var(--warm);border-radius:28px;height:60px;transform:translateY(10px);z-index:-1;border:1px solid rgba(212,207,200,0.4);opacity:0.7;}
.qz-stack-3{position:absolute;width:92%;background:var(--warm);border-radius:28px;height:60px;transform:translateY(18px);z-index:-2;border:1px solid rgba(212,207,200,0.3);opacity:0.4;}

.qz-eyebrow{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--stone);font-weight:500;margin-bottom:10px;}
.qz-eyebrow.gad-ey{color:var(--terra);}
.qz-title{font-family:'Fraunces',serif;font-size:22px;font-weight:200;line-height:1.3;margin-bottom:20px;color:var(--charcoal);}
.qz-body{font-size:14px;color:var(--stone);line-height:1.75;margin-bottom:20px;}
.qz-body strong{color:var(--charcoal);font-weight:500;}

.intro-badge{display:inline-block;background:rgba(125,155,118,0.12);color:var(--sage-dark);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
.intro-badge.gad{background:rgba(196,123,90,0.12);color:var(--terra);}

.qz-icon{font-size:36px;margin-bottom:14px;display:block;}

.answers{display:flex;flex-direction:column;gap:9px;}
.answer-opt{
  display:flex;align-items:center;gap:12px;
  background:var(--cream);border:2px solid var(--mist);
  border-radius:14px;padding:12px 14px;
  cursor:pointer;transition:all 0.2s;
  font-size:14px;color:var(--charcoal);
  font-family:'DM Sans',sans-serif;text-align:left;width:100%;
}
.answer-opt:hover{border-color:var(--sage-light);background:rgba(125,155,118,0.04);}
.answer-opt.selected{border-color:var(--sage);background:rgba(125,155,118,0.08);}
.answer-opt.gad-opt:hover{border-color:var(--terra-light);background:rgba(196,123,90,0.04);}
.answer-opt.gad-opt.selected{border-color:var(--terra);background:rgba(196,123,90,0.08);}
.opt-emoji{font-size:20px;flex-shrink:0;}
.opt-text{flex:1;line-height:1.4;}

.card-next{
  width:100%;margin-top:14px;
  background:var(--charcoal);color:var(--cream);
  border:none;border-radius:14px;padding:14px;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:all 0.2s;display:none;
}
.card-next.visible{display:block;}
.card-next:hover{background:var(--sage-dark);}

.qz-cta{
  width:100%;background:var(--charcoal);color:var(--cream);
  border:none;border-radius:14px;padding:15px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:all 0.2s;margin-top:4px;
}
.qz-cta:hover{background:var(--sage-dark);}

/* ── RESULT SCREEN ── */
#screen-result{
  background:var(--cream);
  align-items:center;justify-content:flex-start;
  padding:60px 24px 40px;text-align:center;
  overflow-y:auto;
}
.result-icon{font-size:52px;margin-bottom:18px;}
.result-title{font-family:'Fraunces',serif;font-size:28px;font-weight:200;line-height:1.2;margin-bottom:10px;}
.result-title em{font-style:italic;color:var(--sage-dark);}
.result-sub{font-size:14px;color:var(--stone);line-height:1.75;max-width:340px;margin:0 auto 28px;}
.result-badges{display:flex;flex-direction:column;gap:10px;align-items:center;margin-bottom:28px;width:100%;max-width:340px;}

/* ── EXPANDABLE BADGES ── */
.result-badge{
  background:var(--warm);border:1.5px solid var(--mist);
  border-radius:100px;padding:10px 20px;
  font-size:13px;font-weight:500;color:var(--charcoal);
  cursor:pointer;transition:all 0.3s ease;
  position:relative;
}
.result-badge.expanded{
  border-radius:18px;
  padding:14px 18px;
  width:100%;max-width:340px;
  border-color:var(--sage);
}
.result-badge.gad-badge.expanded{ border-color:var(--terra); }

.badge-summary{display:flex;align-items:center;gap:8px;justify-content:center;}
.badge-chevron{
  font-size:11px;color:var(--stone);
  transition:transform 0.3s ease;display:inline-block;
  margin-left:4px;
}
.result-badge.expanded .badge-chevron{transform:rotate(180deg);}

.badge-detail{
  display:none;
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--mist);
  text-align:left;
}
.result-badge.expanded .badge-detail{display:block;}
.badge-detail-title{
  font-family:'Fraunces',serif;
  font-size:16px;font-weight:300;font-style:italic;
  color:var(--charcoal);margin-bottom:6px;
}
.badge-detail-body{
  font-size:13px;color:var(--stone);
  line-height:1.7;margin-bottom:10px;
}
.badge-detail-traits{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:8px;
}
.badge-trait{
  background:rgba(125,155,118,0.1);
  color:var(--sage-dark);
  border-radius:100px;
  padding:4px 11px;
  font-size:12px;font-weight:500;
}
.gad-badge .badge-trait{
  background:rgba(196,123,90,0.1);
  color:var(--terra);
}

.result-cta{width:100%;max-width:340px;background:var(--sage-dark);color:white;border:none;border-radius:16px;padding:16px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.result-cta:hover{background:var(--sage);}
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="phase-label" id="phase-label">Welcome</div>

<!-- ════════ SCOTTY WELCOME CHAT ════════ -->
<div id="screen-welcome-chat" class="screen active">
  <div class="welcome-chat-top">
    <div class="scotty-av-dark">🤖</div>
    <div>
      <h2>Scotty</h2>
      <div class="online-dark"><span class="online-dot-dark"></span>here with you</div>
    </div>
  </div>
  <div class="welcome-msgs" id="welcome-msgs"></div>
  <div class="welcome-cta-wrap" id="welcome-cta-wrap">
    <button class="welcome-cta" onclick="goToCards()">Got it — let's go →</button>
  </div>
</div>

<!-- ════════ SWIPE CARDS ════════ -->
<div id="screen-cards" class="screen">
  <div class="card-stage">
    <div class="card-stack-3"></div>
    <div class="card-stack-2"></div>
    <div class="q-card center" id="w-card"></div>
  </div>
  <div class="w-dots" id="w-dots">
    <div class="w-dot active"></div>
    <div class="w-dot"></div>
    <div class="w-dot"></div>
    <div class="w-dot"></div>
    <div class="w-dot"></div>
    <div class="w-dot"></div>
  </div>
</div>

<!-- ════════ INTRO CHAT ════════ -->
<div id="screen-intro" class="screen">
  <div class="chat-top">
    <div class="scotty-av">🤖</div>
    <div>
      <h2>Scotty</h2>
      <div class="online"><span class="online-dot"></span>here with you</div>
    </div>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-input-wrap">
    <textarea class="chat-input" id="chat-input" placeholder="Talk to Scotty..." rows="1"
      onkeydown="chatKeydown(event)" oninput="autoResize(this)" disabled></textarea>
    <button class="send-btn" id="send-btn" onclick="sendIntro()" disabled>➤</button>
  </div>
</div>

<!-- ════════ VARK + GAD QUIZ CARDS ════════ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-stage">
    <div class="qz-stack-3"></div>
    <div class="qz-stack-2"></div>
    <div class="qz-card center" id="qz-card"></div>
  </div>
  <div class="w-dots" id="qz-dots" style="display:none;"></div>
</div>

<!-- ════════ RESULT ════════ -->
<div id="screen-result" class="screen">
  <div class="result-icon">🌿</div>
  <div class="result-title">You're all set, <em id="result-name">friend</em></div>
  <div class="result-sub" id="result-sub">Scotty knows how you learn and where you're starting from.</div>
  <div class="result-badges" id="result-badges"></div>
  <button class="result-cta" onclick="finishOnboarding()">Enter my safe space 🌿</button>
</div>

<script>
// ── Token-based auth: attach Bearer token to every same-origin request ──
(function() {
  const _fetch = window.fetch.bind(window);
  window.fetch = function(url, opts) {
    opts = opts || {};
    const token = localStorage.getItem('scotty_token');
    if (token && typeof url === 'string' && (url.startsWith('/') || url.startsWith(window.location.origin))) {
      opts.headers = Object.assign({}, opts.headers || {}, { 'Authorization': 'Bearer ' + token });
    }
    return _fetch(url, opts);
  };
})();

// ── STATE ─────────────────────────────────────────────
const S = {
  userName:'', introAnswers:[], introStep:0,
  varkAnswers:{}, gadAnswers:{},
  learningStyle:null, gadScore:0,
  quizIndex:0, quizQueue:[],
};

// ── UTILS ─────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

let wIndex = 0;

function renderWelcomeCard(index){
  const card = welcomeCards[index];
  const el = document.getElementById('w-card');
  el.className = 'q-card enter-right';

  let html = `<div class="card-eyebrow">${escH(card.eyebrow)}</div>`;
  html += `<span class="card-icon">${card.icon}</span>`;
  html += `<div class="card-headline">${card.headline}</div>`;

  if(card.body){
    html += `<div class="card-body">${escH(card.body).replace(/\n/g,'<br>').replace(/&lt;strong&gt;/g,'<strong>').replace(/&lt;\/strong&gt;/g,'</strong>').replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')}</div>`;
    // simpler: just use raw since we control the data
  }
  if(card.list){
    html += '<div class="card-list">';
    card.list.forEach(item=>{
      html += `<div class="card-list-item"><span class="cli-icon">${item.icon}</span><div class="cli-text"><strong>${escH(item.title)}</strong> ${escH(item.desc)}</div></div>`;
    });
    html += '</div>';
  }
  if(card.footer){
    html += `<div class="card-footer">${escH(card.footer)}</div>`;
  }

  html += `<button class="card-btn" onclick="nextWelcomeCard()">${escH(card.btn)}</button>`;
  if(card.ghost){
    html += `<button class="card-btn-ghost" onclick="skipToIntro()">${escH(card.ghost)}</button>`;
  }

  el.innerHTML = html;

  // fix body html (we need raw html for em/strong in body)
  if(card.body){
    el.querySelector('.card-body').innerHTML = card.body.replace(/\n/g,'<br>');
  }

  requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.className='q-card center'; }));

  // update dots
  document.querySelectorAll('#w-dots .w-dot').forEach((d,i)=>d.classList.toggle('active',i===index));

  // update progress
  setProgress(14 + Math.round((index/welcomeCards.length)*10));
}

function nextWelcomeCard(){

    wIndex++;
    if(wIndex >= welcomeCards.length){
      startIntroChat();
    } else {
      renderWelcomeCard(wIndex);
    }
  }, 380);
}

function startIntroChat(){
  showScreen('intro');
  setLabel('Getting to know you');
  setProgress(25);
  const q=introQs[0];
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{removeTyping();addMsg('scotty',q.scotty);enableInput();},1200);
  },400);
}

async function sendIntro(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';disableInput();
  addMsg('user',text);
  S.introAnswers.push(text);
  if(S.introStep===0) S.userName=text.split(' ')[0]||'friend';

  const q=introQs[S.introStep];
  showTyping();
  await delay(1000+text.length*6);
  removeTyping();
  addMsg('scotty',q.reply);

  const isLast=S.introStep===introQs.length-1;
  if(!isLast){
    await delay(500);showTyping();await delay(900);removeTyping();
    addMsg('scotty',introQs[S.introStep+1].scotty);
    S.introStep++;enableInput();
    setProgress(25+Math.round((S.introStep/introQs.length)*10));
  } else {
    await delay(1000);
    buildQuizQueue();
    showScreen('quiz');
    setLabel('How you learn');
    setProgress(38);
    renderQuizCard();
  }
}

function buildQuizQueue(){
  S.quizQueue=[];
  S.quizQueue.push({type:'intro',phase:'vark'});
  varkQs.forEach((q,i)=>S.quizQueue.push({type:'vark',qi:i,q}));
  S.quizQueue.push({type:'intro',phase:'gad'});
  gadQs.forEach((q,i)=>S.quizQueue.push({type:'gad',qi:i,q}));
  S.quizIndex=0;
}

function calcVark(){
  const sc={V:0,A:0,R:0,K:0};
  Object.entries(S.varkAnswers).forEach(([id,key])=>{const m=varkMap[id]?.[key];if(m)sc[m]++;});
  const max=Math.max(...Object.values(sc));
  const winner=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0][0];
  const map={V:'visual',A:'auditory',R:'reading_writing',K:'kinesthetic'};
  const labels={V:'Visual learner 🎨',A:'Auditory learner 🎵',R:'Reading/Writing learner 📖',K:'Kinesthetic learner 🏃'};
  S.learningStyle=map[winner];
  return labels[winner];
}

function calcGad(){
  let total=0;Object.values(S.gadAnswers).forEach(v=>total+=v);S.gadScore=total;
  if(total<=4)return{label:'Minimal anxiety',level:'minimal',msg:"You're starting from a calm baseline — this program will help you build on that. 💚",color:'var(--sage-dark)'};
  if(total<=9)return{label:'Mild anxiety',level:'mild',msg:"Mild anxiety is really common, and you're already doing something about it. 💚",color:'#B8963A'};
  if(total<=14)return{label:'Moderate anxiety',level:'moderate',msg:"That took courage to share. This is exactly what this program is designed for. You're in the right place. 💚",color:'var(--terra)'};
  return{label:'Significant anxiety',level:'severe',msg:"Thank you for trusting me with that. We'll take this one session at a time. And if things ever feel too heavy, please reach out to someone you trust or a professional alongside this. 💚",color:'#A0432A'};
}

function showResult(){
  const varkLabel=calcVark();
  const gad=calcGad();
  setProgress(100);
  setLabel('All done');
  document.getElementById('result-name').textContent=S.userName||'friend';
  document.getElementById('result-sub').textContent=gad.msg;

  const vd = varkDetails[S.learningStyle] || varkDetails.visual;
  const gd = gadDetails[gad.level] || gadDetails.mild;

  document.getElementById('result-badges').innerHTML=`
    <div class="result-badge" id="vark-badge" onclick="toggleBadge('vark-badge')">
      <div class="badge-summary">
        ${vd.emoji} ${vd.label}
        <span class="badge-chevron">▾</span>
      </div>
      <div class="badge-detail">
        <div class="badge-detail-title">${vd.title}</div>
        <div class="badge-detail-body">${vd.body}</div>
        <div class="badge-detail-body" style="color:var(--sage-dark);font-size:12px;"><strong>How Scotty shows up for you:</strong> ${vd.scotty}</div>
        <div class="badge-detail-traits">
          ${vd.traits.map(t=>`<span class="badge-trait">${t}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="result-badge gad-badge" id="gad-badge" onclick="toggleBadge('gad-badge')">
      <div class="badge-summary">
        ${gd.emoji} ${gd.label} &nbsp;<span style="color:var(--stone);font-size:11px;">GAD-7 score ${S.gadScore}/21</span>
        <span class="badge-chevron">▾</span>
      </div>
      <div class="badge-detail">
        <div class="badge-detail-title">${gd.title}</div>
        <div class="badge-detail-body">${gd.body}</div>
        <div class="badge-detail-traits">
          ${gd.traits.map(t=>`<span class="badge-trait">${t}</span>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--stone);margin-top:8px;">We'll check in again at session 5 and session 10 to track your progress.</div>
      </div>
    </div>`;

  showScreen('result');
}

function toggleBadge(id){
  const el=document.getElementById(id);
  const wasOpen=el.classList.contains('expanded');
  // close all
  document.querySelectorAll('.result-badge').forEach(b=>b.classList.remove('expanded'));
  // open if it wasn't open
  if(!wasOpen) el.classList.add('expanded');
}

async function finishOnboarding(){
  try{
    await fetch('/api/onboarding',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        learning_style:S.learningStyle,pace:'daily',
        gad7_baseline:S.gadScore,intro_answers:S.introAnswers,
        outreach_push:false,outreach_sms:false,outreach_whatsapp:false,
      })
    });
  }catch(e){console.error(e);}
  window.location.href='/';
}
